<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lol-overlay</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <!-- Status chip: connection + phase, always visible -->
    <div id="status" class="panel status">
      <span id="dot" class="dot"></span>
      <span id="status-text">Waiting for League client…</span>
      <div id="profile" class="profile hidden">
        <img id="profile-icon" class="profile-icon" alt="" />
        <div class="profile-text">
          <span id="profile-name" class="profile-name"></span>
          <span id="profile-rank" class="profile-rank"></span>
          <div id="profile-form" class="profile-form hidden">
            <span id="form-games" class="form-games"></span>
            <span id="form-summary" class="form-summary"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Post-game LP change banner, top-center like the rune banner -->
    <div id="lp-banner" class="panel banner lp-banner hidden">
      <div class="banner-text">
        <strong id="lp-result"></strong>
        <span id="lp-detail"></span>
      </div>
    </div>

    <!-- Champ-select rune import banner -->
    <div id="rune-banner" class="panel banner hidden">
      <img id="rune-champ" class="champ-icon" alt="" />
      <div class="banner-text">
        <strong>Runes imported</strong>
        <span id="rune-name"></span>
      </div>
    </div>

    <!-- Settings (gear in the champ-select header, or Ctrl+Shift+O fallback) -->
    <div id="settings" class="panel settings hidden" data-hit>
      <div class="settings-title">lol-overlay</div>
      <label class="toggle">
        <input type="checkbox" id="auto-import" />
        <span>ルーン自動インポート</span>
      </label>
      <label class="toggle">
        <input type="checkbox" id="spells-import" />
        <span>スペルも書き込む</span>
      </label>
      <div class="hint">
        Ctrl+Shift+O 全体操作(非常用) · Ctrl+Shift+M モニター移動
      </div>
    </div>

    <!-- In-game build panel (hextech, matches the HEXGATE champ-select look).
         The header is always clickable (data-hit): drag to move, chevron to
         collapse. The rest of the panel stays click-through for the game. -->
    <div id="recs" class="panel recs hidden">
      <header class="ig-head" data-hit>
        <span class="ig-brand">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <polygon points="12 2.5 20.2 7.25 20.2 16.75 12 21.5 3.8 16.75 3.8 7.25" />
          </svg>
          HEXGATE
        </span>
        <span class="ig-head-right">
          <span class="ig-chip">IN GAME</span>
          <button id="ig-collapse" class="ig-collapse" title="折りたたみ切替">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 10l5 5 5-5" />
            </svg>
          </button>
        </span>
      </header>
      <!-- Collapse animation: the wrapper's grid row goes 1fr ⇔ 0fr, so the
           body keeps its content while its height transitions (display:none
           would snap). -->
      <div class="ig-collapse-wrap">
        <div class="ig-body">
          <div class="ig-me">
            <img id="recs-champ" class="ig-me-icon" alt="" />
            <div class="ig-me-text">
              <span id="recs-title" class="ig-me-name">—</span>
              <span id="recs-pos" class="ig-me-pos"></span>
            </div>
          </div>
          <div class="ig-intel">
            <div id="enemies" class="enemies"></div>
            <div id="threats" class="threats"></div>
          </div>
          <div id="skill-order" class="ig-skill hidden">
            <div class="skill-label">Skill Order</div>
            <div id="skill-path" class="skill-path"></div>
          </div>
          <div class="ig-section"><span>RECOMMENDED BUILD</span></div>
          <ul id="rec-list"></ul>
        </div>
      </div>
    </div>

    <!-- HEXGATE champ-select panel: fills the 1000x860 ChampSelectMode window.
         The whole panel is a hit region — hover previews and buttons need
         mouse input — and the header drags the window. All dynamic content is
         rendered by src/champselect.ts. -->
    <section id="hexgate" class="hexgate hidden" data-hit>
      <header class="hx-header">
        <div class="hx-brand">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <polygon points="12 2.5 20.2 7.25 20.2 16.75 12 21.5 3.8 16.75 3.8 7.25" />
          </svg>
          <span>HEXGATE</span>
        </div>
        <div id="hx-phase" class="hx-phase-chip">CHAMP SELECT</div>
        <button id="hx-pin" class="hx-pin" title="Keep the panel open after champ select">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M16 9V4h1c.55 0 1-.45 1-1s-.45-1-1-1H7c-.55 0-1 .45-1 1s.45 1 1 1h1v5c0 1.66-1.34 3-3 3v2h5.97v7l1 1 1-1v-7H19v-2c-1.66 0-3-1.34-3-3z"
            />
          </svg>
        </button>
        <button id="hx-gear" class="hx-pin hx-gear" title="設定">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"
            />
          </svg>
        </button>
      </header>

      <div class="hx-body">
        <!-- Left column: tier list for my role -->
        <aside class="hx-left">
          <div id="hx-role-chips" class="hx-role-chips hidden"></div>
          <div class="hx-section-head">
            <span id="hx-role-label" class="hx-role-name">MID</span>
            <span>STRONG PICKS</span>
          </div>
          <div id="hx-strong" class="hx-list hx-strong"></div>
          <div class="hx-section-head">
            <span>BAN TARGETS</span>
          </div>
          <div id="hx-bans" class="hx-list hx-bans"></div>
        </aside>

        <!-- Right column: enemy intel + rune recommendation -->
        <main class="hx-right">
          <div id="hx-enemy-row" class="hx-enemy-row"></div>

          <div id="hx-counters" class="hx-counters hidden">
            <div id="hx-counters-label" class="hx-counters-label"></div>
            <div id="hx-counters-strip" class="hx-counters-strip"></div>
          </div>

          <div class="hx-divider"></div>

          <div id="hx-matchup" class="hx-matchup hidden"></div>

          <nav class="hx-tabs">
            <button id="hx-tab-best" class="hx-tab active">BEST BUILD</button>
            <button id="hx-tab-vs" class="hx-tab" disabled>VS ...</button>
            <div id="hx-vs-menu" class="hx-vs-menu hidden"></div>
          </nav>

          <div id="hx-build" class="hx-build"></div>

          <div id="hx-stats" class="hx-stats hidden">
            <span id="hx-stat-wr" class="hx-stat-wr"></span>
            <span id="hx-stat-games" class="hx-stat-games"></span>
            <span class="hx-stats-spacer"></span>
            <span id="hx-spell-icons" class="hx-spell-icons"></span>
            <button id="hx-flip" class="hx-flip hidden">FLIP</button>
            <label class="hx-spells-toggle">
              <input type="checkbox" id="hx-spells-on" />
              <span>Spells</span>
            </label>
          </div>

          <button id="hx-import" class="hx-import hidden">
            IMPORT RUNES &amp; SPELLS
          </button>
          <div id="hx-pro-row" class="hx-pro-row hidden">
            <span class="hx-pro">PRO</span>
          </div>
        </main>
      </div>
    </section>
  </body>
</html>
