name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: enable corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - name: install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: install dependencies
        run: pnpm install --frozen-lockfile

      # Single source of truth for the app version: the git tag (vX.Y.Z).
      # tauri.conf.json keeps a dev-only placeholder version.
      - name: derive version from tag
        shell: bash
        run: printf '{"version":"%s"}' "${GITHUB_REF_NAME#v}" > release-version.json

      - name: build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # The updater key was generated without a password, and GitHub
          # rejects empty secrets — so pass the empty string literally.
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: lol-overlay ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: --config ./release-version.json ${{ matrix.args }}
