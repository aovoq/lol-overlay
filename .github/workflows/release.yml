name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: cache Bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-${{ runner.arch }}-

      - name: install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      # Restores the cache warmed on main by warm-release-cache.yml (tag runs
      # can only read default-branch caches). Saving from a tag run is useless
      # — no other tag can restore it — so skip the ~2 min upload.
      - name: cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release
          save-if: false

      - name: install dependencies
        run: bun install --frozen-lockfile

      # Single source of truth for the app version: the git tag (vX.Y.Z).
      # tauri.conf.json keeps a dev-only placeholder version.
      - name: derive version from tag
        shell: bash
        run: printf '{"version":"%s"}' "${GITHUB_REF_NAME#v}" > release-version.json

      - name: build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Public configuration used by the desktop pairing UI.
          EXPO_PUBLIC_MOBILE_RELAY_URL: ${{ vars.EXPO_PUBLIC_MOBILE_RELAY_URL }}
          # Must match the Worker secret. Rust embeds this fallback in release builds.
          MOBILE_RELAY_CREATE_SECRET: ${{ secrets.MOBILE_RELAY_CREATE_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # The updater key was generated without a password, and GitHub
          # rejects empty secrets — so pass the empty string literally.
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: lol-overlay ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: --config ./release-version.json ${{ matrix.args }}
