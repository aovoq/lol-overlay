name: checks

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  frontend:
    name: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: cache Bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-${{ runner.arch }}-

      - name: install dependencies
        run: bun install --frozen-lockfile
      - name: check frontend formatting
        run: bun run format:frontend:check
      - name: lint frontend
        run: bun run lint:frontend
      - name: typecheck frontend
        run: bun run typecheck
      - name: build frontend
        run: bun run build

  rust:
    name: rust
    # irelia only compiles for windows/macos targets (LCU process names are
    # gated behind target_os), so lint/test on macOS — matching the release
    # target — rather than Linux.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
      - name: check Rust formatting
        run: cargo fmt --all -- --check
      - name: lint Rust
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test Rust
        run: cargo test --workspace --lib

  toml:
    name: toml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: cache Bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-${{ runner.arch }}-

      - name: install dependencies
        run: bun install --frozen-lockfile
      - name: check TOML formatting
        run: bun run format:toml:check
