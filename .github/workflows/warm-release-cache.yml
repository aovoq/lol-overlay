name: warm-release-cache

# Tag builds can only restore caches created on the default branch, so the
# release workflow's Rust cache is warmed here on main. Runs only when
# dependencies change (rust-cache keeps dependency artifacts, not workspace
# crates), because private-repo macOS/Windows minutes are billed at 10x/2x.
on:
  push:
    branches: ["main"]
    paths:
      - "Cargo.lock"
      - "**/Cargo.toml"
      - "bun.lock"
      - "package.json"
      - ".github/workflows/warm-release-cache.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  warm:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: cache Bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-${{ runner.arch }}-

      - name: install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release

      - name: install dependencies
        run: bun install --frozen-lockfile

      # tauri::generate_context! embeds the frontend dist at compile time,
      # so the frontend must be built before cargo can compile the app.
      - name: build frontend
        run: bun run build

      - name: build release dependencies
        run: cargo build --release --workspace ${{ matrix.args }}
